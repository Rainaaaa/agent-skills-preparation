# agent-skills-preparation pipeline config — TEMPLATE
#
# First-time setup:
#   cp config.example.yaml config.yaml
#   $EDITOR config.yaml          # or just set the env vars below in your shell
#
# String values support ${VAR} and ${VAR:-default} interpolation from the
# process environment. Unset vars fall back to the default after `:-`.
# Same convention as the agent-skills-scanning repo.

project:
  name: "agent-skills-preparation"
  description: "Versioned data preparation pipeline for AgentSkills-OSS misalignment datasets"

paths:
  # Upstream canonical export (one row per skill).
  canonical_records: "${AGENTSKILLS_CANONICAL_RECORDS:-/data/canonical_skill_records.jsonl}"
  # Top-level directory holding all prepared dataset versions. Each
  # downstream stage writes to a subdirectory of this root.
  prepared_root:     "${AGENTSKILLS_PREPARED_ROOT:-/data/prepared}"
  # Workspace for SLURM logs + per-version manifest copies.
  logs_root:         "${AGENTSKILLS_LOGS_ROOT:-./outputs/logs}"
  manifests_root:    "${AGENTSKILLS_MANIFESTS_ROOT:-./outputs/manifests}"

# ----------------------------------------------------------------------
# Filter: drop skills that an upstream verdict CSV classified as
# malicious or misaligned BEFORE running normalize.
#
# Two sources of verdicts are supported via the same key — point
# `scan_results` at whichever you want to use:
#
#   1. `agent-skills-scanning/outputs/unified_results.csv`
#      Auto-generated. Use this as a placeholder while the human review
#      pass is in progress.
#
#   2. A human-reviewed CSV produced by your reviewers.
#      Production runs should switch to this once review is done. The
#      schema is the same as unified_results.csv: a header row with
#      `skill_id`, `overall_class`, `alignment_class` (and any other
#      columns are ignored).
#
#      Example:
#          skill_id,overall_class,alignment_class
#          owner-repo-skill-md,MALICIOUS,MISALIGNED
#          ...
#
# The filter is skipped entirely when `scan_results` is empty / unset /
# the file is missing — useful for a first pass before any verdicts exist.
# Override at the CLI: `pipeline/main.py normalize --scan-results <path>`.
#
# Skills that DON'T survive this filter are recorded in
# `normalized/<v>/excluded_skill_ids.txt` so downstream tasks can use
# them as the real-world evaluation corpus.
# ----------------------------------------------------------------------
filter:
  # Path to the verdict CSV — auto-scan or human-reviewed.
  scan_results: "${AGENTSKILLS_SCAN_RESULTS:-}"

  # Drop if the maliciousness pillar (static_rule ∪ llm_filter ∪ behavioral)
  # produced any of these labels.
  exclude_overall_classes:   ["MALICIOUS", "SUSPICIOUS"]

  # Drop if the alignment axis is `MISALIGNED`. The alignment axis is
  # binary — {ALIGNED, MISALIGNED, ERROR} — so this list typically has
  # one entry. The two axes are independent; either firing is enough.
  exclude_alignment_classes: ["MISALIGNED"]

  # What to do with skills the verdict CSV doesn't mention (e.g. added
  # after the last scan, or never reviewed). "keep" (default) is
  # charitable; "drop" is strict and requires every skill to have a verdict.
  unscanned_action: "keep"

runtime:
  workers: 16
  batch_size: 128
  split_seed: 20260423
  train_fraction: 0.9
  val_fraction: 0.05
  test_fraction: 0.05
  max_package_file_chars: 12000
  max_concat_chars: 48000
  max_stage_chars: 16000
  max_phase1_view_chars: 16000
  max_phase3_evidence_chars: 20000
  parquet_compression: "zstd"

phase1:
  stage1_max_tokens: 4096
  stage2_max_tokens: 10240
  cpt_unseen_fraction: 0.5
  cpt_train_fraction: 0.8
  cpt_val_fraction: 0.1
  cpt_test_fraction: 0.1
  pool_seed: 20260501
  split_seed: 20260502
  max_metadata_chars: 0
  max_instruction_chars: 0
  max_resource_per_file_chars: 0
  max_resource_total_chars: 0

phase2_hcl:
  stage1_max_tokens: 4096
  stage2_max_tokens: 10240
  k_donors: 2
  k_span_donors: 2
  t3b_span_fraction: 0.15
  t3b_span_cap_chars: 1500
  t3b_span_min_chars: 200
  seed: 20260601
  # T3a (LLM-based behavior corruption) is a separate enrichment script:
  #   python -m pipeline.enrich_t3a --help
  # T3c (rule-based hallucinated-identifier injection) similarly:
  #   python -m pipeline.enrich_t3c --help
